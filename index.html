<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Tatiana Manzur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <script src="https://kit.fontawesome.com/2db924c8ac.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./assets/css/style.css">

<body>
    <!--Inicio Navbar-->
    <nav class="navbar navbar-expand-lg navbar-personal">
        <div class="container-fluid">
            <div class="nav-name">Tatiana<span>Manzur</span></div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Sobre mí</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Habilidades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://linkedin.com/in/tatiana-manzur-morales"
                            target="_blank">LinkedIn</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-contacto-pers" type="submit">Contacto</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!--Fin Navbar-->


    <!--Inicio Footer-->
    <footer>
        <div class="container">
            <div class="row justify-content-between">

                <div class="col col-4">
                    <div class="footer-name">
                        Tatiana<span class="align-baseline">Manzur</span>
                    </div>
                    <div class="footer-description">
                        <p class="mb-0">Transformando ideas en productos digitales exitosos</p>
                        <p>Product Manager y Front Developer</p>
                    </div>

                    <div class="d-flex gap-3 justify-content-start align-items-center">
                        <a href="https://www.linkedin.com/in/tatiana-manzur-morales/" target="_blank">
                            <i class="fa-brands fa-linkedin fa-2xl" style="color: #6B1F3A"></i>
                        </a>
                        <a href="https://github.com/tmanzur" target="_blank">
                            <i class="fa-brands fa-square-github fa-2xl" style="color: #6B1F3A;"></i>
                        </a>
                    </div>
                </div>
                
                <!--Form-->
                <div class="col col-7">
                    <div class="container-fluid">
                        <div>
                            <h3 class="footer-contact">Hablemos<em>✦</em></h3>
                        </div>

                        <div class="row">
                            <div class="col">
                                <input type="text" class="form-control footer-input" placeholder="Nombre" aria-label="Nombre">
                            </div>
                            <div class="col">
                                <input type="email" class="form-control footer-input" id="exampleInputEmail1"
                                    aria-describedby="emailHelp" placeholder="Correo Electrónico">
                            </div>
                            <div class="mb-3 mt-2">
                                <textarea class="form-control footer-input" id="exampleFormControlTextarea1" rows="3"
                                    placeholder="Escribe tu mensaje"></textarea>
                            </div>
                            <div class="col-auto">
                                <button type="submit" class="btn btn-contacto-pers mb-3">Contactar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div footer-bottom>

            <div class="container mt-2 ">
                <div class="row justify-content-evenly">

                    <span class="col">© 2026 · TatianaManzur </span>
                    <span class="col text-end">Hecho con ♥ y mucho café</span>
                </div>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
